<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babacômetro | Medidor de Vacilo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --accent-red: #ff4757;
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --transition-smooth: all 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-top: 80px;
        }

        /* --- HEADER --- */
        .header-fixed {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6%;
            border-bottom: 1px solid var(--border-light);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .brand-logo {
            font-size: 1.6rem; font-weight: 900; letter-spacing: -1px;
            text-decoration: none; color: var(--text-primary);
            text-transform: uppercase;
        }

        .brand-logo i { color: var(--accent-red); margin-right: 10px; }
        .brand-logo span { color: var(--accent-red); }

        /* --- CONTAINER --- */
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 40px auto;
            padding-bottom: 120px;
        }

        .section-intro {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-intro p {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .section-intro h2 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        /* --- GRID --- */
        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .person-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            transition: var(--transition-smooth);
            position: relative;
        }

        .person-card.leader {
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.02);
        }

        /* Avatar & Coroa */
        .avatar-box {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-light);
            padding: 5px;
            background: var(--bg-secondary);
        }

        .crown-overlay {
            position: absolute;
            top: -25px; left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            color: #FFD700;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.6));
            opacity: 0;
            transition: 0.3s;
            z-index: 10;
        }

        .leader .crown-overlay { opacity: 1; animation: bounce 2s infinite; }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        .person-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; }
        .leader .person-name { color: #FFD700; }

        /* Score */
        .score-box { margin-bottom: 25px; }
        .score-num { font-size: 3.8rem; font-weight: 900; line-height: 1; color: var(--accent-red); }
        .leader .score-num { color: #FFD700; }
        .score-txt { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin-top: 5px; }

        /* Controles */
        .controls { display: flex; justify-content: center; gap: 15px; }
        .btn-p {
            width: 55px; height: 55px; border-radius: 18px; border: 1px solid var(--border-light);
            background: rgba(255,255,255,0.05); color: white; font-size: 1.3rem; cursor: pointer; transition: 0.2s;
        }
        .btn-p:active { transform: scale(0.9); }
        .btn-add { background: var(--accent-red); border: none; }

        /* Barra */
        .prog-container { margin-top: 30px; }
        .prog-bg { height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent-red); width: 0%; transition: width 1s ease; }
        .leader .prog-fill { background: #FFD700; }

        /* Footer Floaters */
        .floating-actions {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; background: rgba(0,0,0,0.8);
            padding: 12px; border-radius: 24px; backdrop-filter: blur(10px);
            border: 1px solid var(--border-light); z-index: 2000;
        }

        .btn-g {
            padding: 14px 24px; border-radius: 16px; border: none; font-weight: 700;
            font-size: 0.8rem; text-transform: uppercase; cursor: pointer; color: white;
        }
        .btn-clear { background: transparent; border: 1px solid var(--border-light); }
        .btn-refresh { background: var(--accent-red); }

        /* Toast */
        .notification {
            position: fixed; top: 100px; right: 20px;
            background: #FFF; color: #000; padding: 16px 28px;
            border-radius: 16px; font-weight: 700; transform: translateX(250%);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999;
        }
        .notification.show { transform: translateX(0); }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="brand-logo"><i class="fas fa-fire"></i>BABAC<span>ÔMETRO</span></div>
    </header>

    <div class="notification" id="toast">Sincronizado!</div>

    <main class="container">
        <div class="section-intro">
            <p>Controle oficial de vacilos</p>
            <h2>Ranking de Babacas</h2>
        </div>

        <div class="people-grid" id="peopleGrid">
            </div>
    </main>

    <div class="floating-actions">
        <button class="btn-g btn-clear" id="zeroBtn"><i class="fas fa-trash-alt"></i> Zerar</button>
        <button class="btn-g btn-refresh" id="loadBtn"><i class="fas fa-sync-alt"></i> Atualizar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEpzihWjXaGD7DcNlXqqVfsuPiwbzUiH0",
            authDomain: "babacometro-firebase.firebaseapp.com",
            projectId: "babacometro-firebase",
            storageBucket: "babacometro-firebase.firebasestorage.app",
            messagingSenderId: "128530343865",
            appId: "1:128530343865:web:8cc0ee623b3788edeef868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION = "babacometro";

        let people = [
            { id: 1, name: "André", docId: "andre", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1456416/a7fa78f57e73ecbd0b9500a062d0d214/main/944/9443050d93f5e04d2e1e71f34e1f62b7/CPBSB6_Influencers_MAR-2024-13.jpg.png" },
            { id: 2, name: "Guilherme", docId: "guilherme", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1797518/a7fa78f57e73ecbd0b9500a062d0d214/main/8e3/8e33b192d613594ea8861dbb4f32e7ba/avatar.png" },
            { id: 3, name: "Lucas", docId: "lucas", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1259888/a7fa78f57e73ecbd0b9500a062d0d214/main/657/657983805453bff6d018035fe80aa95b/foto%20perfil.jpg.png" },
            { id: 4, name: "Wesley", docId: "wesley", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1683770/a7fa78f57e73ecbd0b9500a062d0d214/main/64e/64ea5ab3537b228c7649277d62c0d635/Foto%20perfil.png" }
        ];

        async function loadData() {
            try {
                for (const person of people) {
                    const ref = doc(db, COLLECTION, person.docId);
                    const snap = await getDoc(ref);
                    if (snap.exists()) person.points = snap.data().points;
                }
                render();
                showNotify("Dados Carregados");
            } catch (e) { showNotify("Erro ao conectar"); }
        }

        async function updatePoints(person, amount) {
            const newPoints = Math.max(0, person.points + amount);
            const ref = doc(db, COLLECTION, person.docId);
            try {
                await updateDoc(ref, { points: newPoints });
                person.points = newPoints;
                render();
            } catch (e) { showNotify("Erro ao salvar"); }
        }

        async function resetAll() {
            if(!confirm("Deseja zerar todos os babacas?")) return;
            const batch = writeBatch(db);
            people.forEach(p => {
                batch.update(doc(db, COLLECTION, p.docId), { points: 0 });
                p.points = 0;
            });
            await batch.commit();
            render();
            showNotify("Tudo zerado!");
        }

        function render() {
            const grid = document.getElementById("peopleGrid");
            const maxPoints = Math.max(...people.map(p => p.points));
            
            grid.innerHTML = people.map(p => {
                const isLeader = maxPoints > 0 && p.points === maxPoints;
                const progress = Math.min((p.points / 15) * 100, 100);
                
                return `
                    <div class="person-card ${isLeader ? 'leader' : ''}">
                        <div class="crown-overlay"><i class="fas fa-crown"></i></div>
                        <div class="avatar-box">
                            <img src="${p.avatar}" class="avatar-img">
                        </div>
                        <h3 class="person-name">${p.name}</h3>
                        <div class="score-box">
                            <div class="score-num">${p.points}</div>
                            <div class="score-txt">Nível de Babaca</div>
                        </div>
                        <div class="controls">
                            <button class="btn-p" onclick="act(${p.id}, -1)"><i class="fas fa-minus"></i></button>
                            <button class="btn-p btn-add" onclick="act(${p.id}, 1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="prog-container">
                            <div class="prog-bg"><div class="prog-fill" style="width: ${progress}%"></div></div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        window.act = (id, amt) => {
            const p = people.find(x => x.id === id);
            updatePoints(p, amt);
        };

        function showNotify(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2500);
        }

        document.getElementById("loadBtn").onclick = loadData;
        document.getElementById("zeroBtn").onclick = resetAll;

        loadData();
    </script>
</body>
</html>
