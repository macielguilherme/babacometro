<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babacômetro | Virtudes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0A0A0A;
            --bg-secondary: #141414;
            --text-primary: #FFFFFF;
            --text-secondary: #A3A3A3;
            --accent-red: #ef4444;
            --border-light: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --transition-smooth: all 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-top: 80px; /* Espaço para o header fixo */
        }

        /* --- HEADER ESTILO VIRTUDES --- */
        .m3-header {
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 6%;
            border-bottom: 1px solid var(--border-light);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .brand-logo {
            font-size: 1.4rem; font-weight: 700; letter-spacing: -1px;
            text-decoration: none; color: var(--text-primary);
        }

        .brand-logo span { color: var(--accent-red); }

        /* --- CONTAINER PRINCIPAL --- */
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 40px auto;
            padding-bottom: 100px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-header p {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            color: var(--accent-red);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .section-header h2 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        /* --- GRID DE PESSOAS --- */
        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .person-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .person-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Avatar */
        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-light);
            padding: 5px;
        }

        .crown-icon {
            position: absolute;
            top: -15px; left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: #FFD700;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
            display: none;
        }

        .leader .crown-icon { display: block; animation: float 2s infinite ease-in-out; }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        .person-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        /* Pontuação */
        .score-display {
            margin: 20px 0;
        }

        .score-value {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            color: var(--text-primary);
        }

        .score-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-action {
            width: 50px; height: 50px;
            border-radius: 15px;
            border: 1px solid var(--border-light);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:active { transform: scale(0.9); }
        .btn-plus { background: var(--accent-red); border: none; font-weight: 800; }

        /* Barra de Progresso Estilo Virtudes */
        .progress-box { margin-top: 30px; }
        .progress-bg {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-red);
            width: 0%;
            transition: width 1s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* Botões Globais */
        .global-footer-btns {
            position: fixed;
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 2000;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
        }

        .btn-global {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            color: white;
        }

        .btn-zero { background: transparent; border: 1px solid var(--border-light); }
        .btn-sync { background: var(--accent-red); }

        /* Notificação */
        .toast {
            position: fixed; top: 100px; right: 20px;
            background: white; color: black;
            padding: 15px 25px; border-radius: 12px;
            font-weight: 700; transform: translateX(200%);
            transition: 0.5s; z-index: 9999;
        }
        .toast.show { transform: translateX(0); }

    </style>
</head>
<body>

    <header class="m3-header">
        <a href="#" class="brand-logo">BABAC<span>ÔMETRO</span></a>
        <div style="font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.1em;">
            Virtudes Jovens
        </div>
    </header>

    <div class="toast" id="toast">Sincronizado!</div>

    <main class="container">
        <div class="section-header">
            <p>Monitoramento em tempo real</p>
            <h2>Nível de Vacilo</h2>
        </div>

        <div class="people-grid" id="peopleGrid">
            </div>
    </main>

    <div class="global-footer-btns">
        <button class="btn-global btn-zero" id="zeroBtn"><i class="fas fa-trash"></i> Reset</button>
        <button class="btn-global btn-sync" id="loadBtn"><i class="fas fa-sync"></i> Atualizar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEpzihWjXaGD7DcNlXqqVfsuPiwbzUiH0",
            authDomain: "babacometro-firebase.firebaseapp.com",
            projectId: "babacometro-firebase",
            storageBucket: "babacometro-firebase.firebasestorage.app",
            messagingSenderId: "128530343865",
            appId: "1:128530343865:web:8cc0ee623b3788edeef868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION = "babacometro";

        let people = [
            { id: 1, name: "André", docId: "andre", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1456416/a7fa78f57e73ecbd0b9500a062d0d214/main/944/9443050d93f5e04d2e1e71f34e1f62b7/CPBSB6_Influencers_MAR-2024-13.jpg.png" },
            { id: 2, name: "Guilherme", docId: "guilherme", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1797518/a7fa78f57e73ecbd0b9500a062d0d214/main/8e3/8e33b192d613594ea8861dbb4f32e7ba/avatar.png" },
            { id: 3, name: "Lucas", docId: "lucas", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1259888/a7fa78f57e73ecbd0b9500a062d0d214/main/657/657983805453bff6d018035fe80aa95b/foto%20perfil.jpg.png" },
            { id: 4, name: "Wesley", docId: "wesley", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1683770/a7fa78f57e73ecbd0b9500a062d0d214/main/64e/64ea5ab3537b228c7649277d62c0d635/Foto%20perfil.png" }
        ];

        async function loadData() {
            for (const person of people) {
                const ref = doc(db, COLLECTION, person.docId);
                const snap = await getDoc(ref);
                if (snap.exists()) person.points = snap.data().points;
            }
            render();
            showToast("Dados Sincronizados");
        }

        async function updatePoints(person, amount) {
            const newPoints = Math.max(0, person.points + amount);
            const ref = doc(db, COLLECTION, person.docId);
            await updateDoc(ref, { points: newPoints });
            person.points = newPoints;
            render();
        }

        async function resetAll() {
            if(!confirm("Zerar tudo?")) return;
            const batch = writeBatch(db);
            people.forEach(p => {
                batch.update(doc(db, COLLECTION, p.docId), { points: 0 });
                p.points = 0;
            });
            await batch.commit();
            render();
            showToast("Zeradinho!");
        }

        function render() {
            const grid = document.getElementById("peopleGrid");
            const maxPoints = Math.max(...people.map(p => p.points));
            
            grid.innerHTML = people.map(p => {
                const isLeader = maxPoints > 0 && p.points === maxPoints;
                const progress = Math.min((p.points / 20) * 100, 100);
                
                return `
                    <div class="person-card ${isLeader ? 'leader' : ''}">
                        <i class="fas fa-crown crown-icon"></i>
                        <div class="avatar-wrapper">
                            <img src="${p.avatar}" class="avatar-img">
                        </div>
                        <h3 class="person-name">${p.name}</h3>
                        <div class="score-display">
                            <div class="score-value">${p.points}</div>
                            <div class="score-label">Pontos Babaca</div>
                        </div>
                        <div class="controls">
                            <button class="btn-action" onclick="changeP(${p.id}, -1)"><i class="fas fa-minus"></i></button>
                            <button class="btn-action btn-plus" onclick="changeP(${p.id}, 1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="progress-box">
                            <div class="progress-bg"><div class="progress-fill" style="width: ${progress}%"></div></div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        window.changeP = (id, amt) => {
            const p = people.find(x => x.id === id);
            updatePoints(p, amt);
        };

        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 3000);
        }

        document.getElementById("loadBtn").onclick = loadData;
        document.getElementById("zeroBtn").onclick = resetAll;

        loadData();
    </script>
</body>
</html>
