<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babacômetro Pro | Ranking de Vacilos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050505;
            --bg-secondary: #111111;
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --accent-red: #ff3e3e;
            --accent-gold: #FFD700;
            --border-light: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --card-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
        }

        /* --- HEADER --- */
        .header-fixed {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-light);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .brand-logo {
            font-size: 1.4rem; font-weight: 900; letter-spacing: -1px;
            text-transform: uppercase;
        }
        .brand-logo i { color: var(--accent-red); margin-right: 8px; }
        .brand-logo span { color: var(--accent-red); }

        /* --- CONTAINER --- */
        .container {
            width: 92%;
            max-width: 1400px;
            margin: 0 auto 120px;
        }

        .section-intro {
            text-align: center;
            margin-bottom: 60px;
        }
        .section-intro h2 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- NOVO GRID --- */
        .people-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .person-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: 35px 25px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .person-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.04);
            border-color: rgba(255,255,255,0.1);
        }

        .person-card.leader {
            border-color: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.05);
        }

        /* Avatar */
        .avatar-box {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 20px;
        }

        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--bg-secondary);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .crown-overlay {
            position: absolute;
            top: -20px; left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            color: var(--accent-gold);
            filter: drop-shadow(0 0 10px var(--accent-gold));
            opacity: 0;
            z-index: 10;
        }
        .leader .crown-overlay { opacity: 1; animation: float 3s infinite ease-in-out; }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-10px); }
        }

        .person-name { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
        .leader .person-name { color: var(--accent-gold); }

        /* Score */
        .score-box { margin: 20px 0; }
        .score-num { font-size: 4.5rem; font-weight: 900; color: var(--accent-red); letter-spacing: -2px; }
        .leader .score-num { color: var(--accent-gold); }
        .score-txt { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; }

        /* Controles */
        .controls { display: flex; justify-content: center; gap: 12px; }
        .btn-p {
            width: 60px; height: 50px; border-radius: 15px; 
            border: 1px solid var(--border-light);
            background: rgba(255,255,255,0.05); color: white; cursor: pointer; transition: 0.2s;
        }
        .btn-p:hover { background: rgba(255,255,255,0.1); }
        .btn-add { background: var(--accent-red); border: none; font-size: 1.2rem; }
        .btn-add:hover { background: #ff5252; transform: scale(1.05); }

        /* Barra de Progresso */
        .prog-container { margin-top: 30px; padding: 0 10px; }
        .prog-bg { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent-red); transition: width 1s cubic-bezier(0.1, 0, 0, 1); }
        .leader .prog-fill { background: var(--accent-gold); }

        /* Floating Actions */
        .floating-actions {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8);
            padding: 12px 25px; border-radius: 100px; backdrop-filter: blur(20px);
            border: 1px solid var(--border-light); z-index: 2000;
        }
        .btn-g {
            padding: 12px 20px; border-radius: 50px; border: none; font-weight: 700;
            font-size: 0.75rem; text-transform: uppercase; cursor: pointer; color: white;
            display: flex; align-items: center; gap: 8px;
        }
        .btn-clear { background: transparent; border: 1px solid rgba(255,255,255,0.1); }
        .btn-refresh { background: #fff; color: #000; }

        /* Toast */
        .notification {
            position: fixed; top: 90px; right: 20px;
            background: #FFF; color: #000; padding: 15px 25px;
            border-radius: 12px; font-weight: 800; transform: translateX(200%);
            transition: 0.5s; z-index: 9999;
        }
        .notification.show { transform: translateX(0); }

        @media (max-width: 600px) {
            .section-intro h2 { font-size: 2rem; }
            .people-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="brand-logo"><i class="fas fa-skull"></i>BABAC<span>ÔMETRO</span></div>
    </header>

    <div class="notification" id="toast">Sincronizado!</div>

    <main class="container">
        <div class="section-intro">
            <p style="color: var(--text-secondary); text-transform: uppercase; letter-spacing: 4px; font-size: 0.7rem; margin-bottom: 10px;">Monitoramento em Tempo Real</p>
            <h2>Ranking de Vacilos</h2>
        </div>

        <div class="people-grid" id="peopleGrid"></div>
    </main>

    <div class="floating-actions">
        <button class="btn-g btn-clear" id="zeroBtn"><i class="fas fa-trash-alt"></i> Zerar</button>
        <button class="btn-g btn-refresh" id="loadBtn"><i class="fas fa-sync-alt"></i> Atualizar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEpzihWjXaGD7DcNlXqqVfsuPiwbzUiH0",
            authDomain: "babacometro-firebase.firebaseapp.com",
            projectId: "babacometro-firebase",
            storageBucket: "babacometro-firebase.firebasestorage.app",
            messagingSenderId: "128530343865",
            appId: "1:128530343865:web:8cc0ee623b3788edeef868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION = "babacometro";

        let people = [
            { id: 1, name: "Thanner Machado", docId: "thanner", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1854826/ff58db95aecdfa09ae61b51b5fd8f63f/main/ff4/ff4cf2cd8628a0777bae5e74b8af3c2f/Foto%20Profissional%20-%20Blazer%202.png" },
            { id: 2, name: "Natalia Lucchetti", docId: "natalia", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1475014/ff58db95aecdfa09ae61b51b5fd8f63f/main/83c/83c5308d8d35f340e98fb6e2ad0dc86c/avatar.png" },
            { id: 3, name: "Wesley Mourão", docId: "wesley", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1683770/a7fa78f57e73ecbd0b9500a062d0d214/main/64e/64ea5ab3537b228c7649277d62c0d635/Foto%20perfil.png" },
            { id: 4, name: "Miqueas Andrade", docId: "miqueas", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/321177/ff58db95aecdfa09ae61b51b5fd8f63f/main/d96/d96e11b40df523977b7c88e457c0da2c/Foto.jpg" },
            { id: 5, name: "Fábio Moura", docId: "fabio", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1146590/ff58db95aecdfa09ae61b51b5fd8f63f/main/b02/b02a0e2583c6fddf22a6c9822169beb6/IMG_5981.jpg.png" },
            { id: 6, name: "Lucas Freitas", docId: "lucas", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1259888/a7fa78f57e73ecbd0b9500a062d0d214/main/657/657983805453bff6d018035fe80aa95b/foto%20perfil.jpg.png" },
            { id: 7, name: "Ariel Vieira", docId: "ariel", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1477916/ff58db95aecdfa09ae61b51b5fd8f63f/main/16c/16cdf2dea99724a3e78d6fc9a4f4f648/avatar.png" },
            { id: 8, name: "Guilherme Ribeiro", docId: "guilherme", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1797518/a7fa78f57e73ecbd0b9500a062d0d214/main/8e3/8e33b192d613594ea8861dbb4f32e7ba/avatar.png" },
            { id: 9, name: "Abner Ambrósio", docId: "abner", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1801982/ff58db95aecdfa09ae61b51b5fd8f63f/main/9af/9afde7b1ea11956a3577eaa29c61ed53/Perfil.png" },
            { id: 10, name: "André Rodrigues", docId: "andre", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1456416/a7fa78f57e73ecbd0b9500a062d0d214/main/944/9443050d93f5e04d2e1e71f34e1f62b7/CPBSB6_Influencers_MAR-2024-13.jpg.png" }
        ];

        async function loadData() {
            try {
                for (const person of people) {
                    const ref = doc(db, COLLECTION, person.docId);
                    const snap = await getDoc(ref);
                    if (snap.exists()) person.points = snap.data().points;
                }
                render();
                showNotify("Ranking Sincronizado");
            } catch (e) { showNotify("Erro de conexão"); }
        }

        async function updatePoints(person, amount) {
            const newPoints = Math.max(0, person.points + amount);
            const ref = doc(db, COLLECTION, person.docId);
            try {
                await updateDoc(ref, { points: newPoints });
                person.points = newPoints;
                render();
            } catch (e) { showNotify("Erro ao salvar"); }
        }

        async function resetAll() {
            const senha = prompt("Digite a senha para zerar o ranking:");
            if (senha === null) return;
            
            if (senha.toLowerCase() === "babaca") {
                if(!confirm("Cuidado! Isso vai zerar todos os vacilos. Prosseguir?")) return;
                const batch = writeBatch(db);
                people.forEach(p => {
                    batch.update(doc(db, COLLECTION, p.docId), { points: 0 });
                    p.points = 0;
                });
                await batch.commit();
                render();
                showNotify("Tudo zerado!");
            } else {
                alert("Senha errada, babaca!");
            }
        }

        function render() {
            const grid = document.getElementById("peopleGrid");
            const maxPoints = Math.max(...people.map(p => p.points));
            const sorted = [...people].sort((a, b) => b.points - a.points);

            grid.innerHTML = sorted.map(p => {
                const isLeader = maxPoints > 0 && p.points === maxPoints;
                const progress = Math.min((p.points / 20) * 100, 100);
                
                return `
                    <div class="person-card ${isLeader ? 'leader' : ''}">
                        <div class="crown-overlay"><i class="fas fa-crown"></i></div>
                        <div class="avatar-box">
                            <img src="${p.avatar}" class="avatar-img" onerror="this.src='https://ui-avatars.com/api/?name=${p.name}&background=333&color=fff'">
                        </div>
                        <h3 class="person-name">${p.name}</h3>
                        <div class="score-box">
                            <div class="score-num">${p.points}</div>
                            <div class="score-txt">Vacilos Acumulados</div>
                        </div>
                        <div class="controls">
                            <button class="btn-p" onclick="act(${p.id}, -1)"><i class="fas fa-minus"></i></button>
                            <button class="btn-p btn-add" onclick="act(${p.id}, 1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="prog-container">
                            <div class="prog-bg"><div class="prog-fill" style="width: ${progress}%"></div></div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        window.act = (id, amt) => {
            const p = people.find(x => x.id === id);
            updatePoints(p, amt);
        };

        function showNotify(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2500);
        }

        document.getElementById("loadBtn").onclick = loadData;
        document.getElementById("zeroBtn").onclick = resetAll;

        loadData();
    </script>
</body>
</html>
