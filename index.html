<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babacômetro Pro | Ranking 5x5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #050505;
            --bg-secondary: #111111;
            --text-primary: #FFFFFF;
            --text-secondary: #888888;
            --accent-red: #ff3e3e;
            --accent-gold: #FFD700;
            --border-light: rgba(255, 255, 255, 0.05);
            --glass-bg: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-top: 80px;
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
        }

        .header-fixed {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-light);
            position: fixed;
            top: 0; width: 100%; z-index: 1000;
        }

        .brand-logo {
            font-size: 1.2rem; font-weight: 900; letter-spacing: -1px;
            text-transform: uppercase;
        }
        .brand-logo i { color: var(--accent-red); margin-right: 8px; }
        .brand-logo span { color: var(--accent-red); }

        .container {
            width: 95%;
            max-width: 1400px;
            margin: 0 auto 100px;
        }

        .section-intro {
            text-align: center;
            margin-bottom: 30px;
        }
        .section-intro h2 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* GRID PRINCIPAL */
        .people-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 colunas no PC */
            gap: 12px;
        }

        .person-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .person-card.leader {
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(255, 215, 0, 0.03);
        }

        .avatar-box {
            position: relative;
            width: 70px; height: 70px;
            margin: 0 auto 12px;
        }

        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-light);
        }

        .crown-overlay {
            position: absolute;
            top: -12px; left: 50%;
            transform: translateX(-50%);
            font-size: 1.3rem;
            color: var(--accent-gold);
            opacity: 0;
            z-index: 10;
        }
        .leader .crown-overlay { opacity: 1; animation: float 3s infinite ease-in-out; }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        .person-name { 
            font-size: 0.95rem; 
            font-weight: 700; 
            margin-bottom: 8px;
            color: #eee;
        }
        .leader .person-name { color: var(--accent-gold); }

        .score-num { font-size: 2.5rem; font-weight: 900; color: var(--accent-red); line-height: 1; }
        .leader .score-num { color: var(--accent-gold); }
        .score-txt { font-size: 0.55rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;}

        .controls { display: flex; justify-content: center; gap: 6px; }
        .btn-p {
            width: 40px; height: 38px; border-radius: 10px; 
            border: 1px solid var(--border-light);
            background: rgba(255,255,255,0.05); color: white; cursor: pointer;
        }
        .btn-add { background: var(--accent-red); border: none; }

        .prog-container { margin-top: 15px; padding: 0 10px; }
        .prog-bg { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent-red); transition: width 0.8s ease; }
        .leader .prog-fill { background: var(--accent-gold); }

        .floating-actions {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; background: rgba(0,0,0,0.9);
            padding: 8px 15px; border-radius: 50px; backdrop-filter: blur(20px);
            border: 1px solid var(--border-light); z-index: 2000;
        }
        .btn-g {
            padding: 8px 14px; border-radius: 50px; border: none; font-weight: 700;
            font-size: 0.65rem; text-transform: uppercase; cursor: pointer; color: white;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-clear { background: transparent; border: 1px solid rgba(255,255,255,0.1); }
        .btn-refresh { background: #fff; color: #000; }

        .notification {
            position: fixed; top: 70px; right: 20px;
            background: #FFF; color: #000; padding: 10px 15px;
            border-radius: 8px; font-weight: 800; transform: translateX(220%);
            transition: 0.4s; z-index: 9999; font-size: 0.75rem;
        }
        .notification.show { transform: translateX(0); }

        /* RESPONSIVIDADE CORRIGIDA */
        @media (max-width: 1100px) {
            .people-grid { grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 700px) {
            .people-grid { 
                grid-template-columns: repeat(2, 1fr); /* 2 colunas no celular para não ficar fino */
                gap: 10px;
            }
            .section-intro h2 { font-size: 1.6rem; }
            .container { width: 92%; }
            .avatar-box { width: 60px; height: 60px; }
            .score-num { font-size: 2rem; }
        }

        @media (max-width: 380px) {
            .people-grid { grid-template-columns: 1fr; } /* 1 coluna se o celular for muito pequeno */
        }
    </style>
</head>
<body>

    <header class="header-fixed">
        <div class="brand-logo"><i class="fas fa-skull"></i>BABAC<span>ÔMETRO</span></div>
    </header>

    <div class="notification" id="toast">Sincronizado!</div>

    <main class="container">
        <div class="section-intro">
            <h2>Ranking de Vacilos</h2>
        </div>
        <div class="people-grid" id="peopleGrid"></div>
    </main>

    <div class="floating-actions">
        <button class="btn-g btn-clear" id="zeroBtn"><i class="fas fa-trash-alt"></i> Zerar</button>
        <button class="btn-g btn-refresh" id="loadBtn"><i class="fas fa-sync-alt"></i> Atualizar</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEpzihWjXaGD7DcNlXqqVfsuPiwbzUiH0",
            authDomain: "babacometro-firebase.firebaseapp.com",
            projectId: "babacometro-firebase",
            storageBucket: "babacometro-firebase.firebasestorage.app",
            messagingSenderId: "128530343865",
            appId: "1:128530343865:web:8cc0ee623b3788edeef868"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const COLLECTION = "babacometro";

        let people = [
            { id: 1, name: "Thanner Machado", docId: "thanner", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1854826/ff58db95aecdfa09ae61b51b5fd8f63f/main/ff4/ff4cf2cd8628a0777bae5e74b8af3c2f/Foto%20Profissional%20-%20Blazer%202.png" },
            { id: 2, name: "Natalia Lucchetti", docId: "natalia", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1475014/ff58db95aecdfa09ae61b51b5fd8f63f/main/83c/83c5308d8d35f340e98fb6e2ad0dc86c/avatar.png" },
            { id: 3, name: "Wesley Mourão", docId: "wesley", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1683770/a7fa78f57e73ecbd0b9500a062d0d214/main/64e/64ea5ab3537b228c7649277d62c0d635/Foto%20perfil.png" },
            { id: 4, name: "Miqueas Andrade", docId: "miqueas", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/321177/ff58db95aecdfa09ae61b51b5fd8f63f/main/d96/d96e11b40df523977b7c88e457c0da2c/Foto.jpg" },
            { id: 5, name: "Fábio Moura", docId: "fabio", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1146590/ff58db95aecdfa09ae61b51b5fd8f63f/main/b02/b02a0e2583c6fddf22a6c9822169beb6/IMG_5981.jpg.png" },
            { id: 6, name: "Lucas Freitas", docId: "lucas", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1259888/a7fa78f57e73ecbd0b9500a062d0d214/main/657/657983805453bff6d018035fe80aa95b/foto%20perfil.jpg.png" },
            { id: 7, name: "Ariel Vieira", docId: "ariel", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1477916/ff58db95aecdfa09ae61b51b5fd8f63f/main/16c/16cdf2dea99724a3e78d6fc9a4f4f648/avatar.png" },
            { id: 8, name: "Guilherme Ribeiro", docId: "guilherme", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1797518/a7fa78f57e73ecbd0b9500a062d0d214/main/8e3/8e33b192d613594ea8861dbb4f32e7ba/avatar.png" },
            { id: 9, name: "Abner Ambrósio", docId: "abner", points: 0, avatar: "https://cdn.bitrix24.com.br/b7533877/resize_cache/1801982/ff58db95aecdfa09ae61b51b5fd8f63f/main/9af/9afde7b1ea11956a3577eaa29c61ed53/Perfil.png" },
            { id: 10, name: "André Rodrigues", docId: "andre", points: 0, avatar: "https://sosdocs.bitrix24.com.br/b7533877/resize_cache/1456416/a7fa78f57e73ecbd0b9500a062d0d214/main/944/9443050d93f5e04d2e1e71f34e1f62b7/CPBSB6_Influencers_MAR-2024-13.jpg.png" }
        ];

        async function loadData() {
            try {
                for (const person of people) {
                    const ref = doc(db, COLLECTION, person.docId);
                    const snap = await getDoc(ref);
                    if (snap.exists()) person.points = snap.data().points;
                }
                render();
                showNotify("Dados Carregados");
            } catch (e) { showNotify("Erro ao conectar"); }
        }

        async function updatePoints(person, amount) {
            const newPoints = Math.max(0, person.points + amount);
            const ref = doc(db, COLLECTION, person.docId);
            try {
                await updateDoc(ref, { points: newPoints });
                person.points = newPoints;
                render();
            } catch (e) { showNotify("Erro ao salvar"); }
        }

        async function resetAll() {
            const senha = prompt("Digite a senha para zerar:");
            if (senha === null) return;
            if (senha.toLowerCase() === "babaca") {
                const batch = writeBatch(db);
                people.forEach(p => {
                    batch.update(doc(db, COLLECTION, p.docId), { points: 0 });
                    p.points = 0;
                });
                await batch.commit();
                render();
                showNotify("Tudo zerado!");
            } else {
                alert("Errou a senha, babaca! 🖕");
            }
        }

        function render() {
            const grid = document.getElementById("peopleGrid");
            const maxPoints = Math.max(...people.map(p => p.points));
            const sorted = [...people].sort((a, b) => b.points - a.points);

            grid.innerHTML = sorted.map(p => {
                const isLeader = maxPoints > 0 && p.points === maxPoints;
                const progress = Math.min((p.points / 15) * 100, 100);
                
                return `
                    <div class="person-card ${isLeader ? 'leader' : ''}">
                        <div class="crown-overlay"><i class="fas fa-crown"></i></div>
                        <div class="avatar-box">
                            <img src="${p.avatar}" class="avatar-img" onerror="this.src='https://ui-avatars.com/api/?name=${p.name}'">
                        </div>
                        <h3 class="person-name">${p.name}</h3>
                        <div class="score-box">
                            <div class="score-num">${p.points}</div>
                            <div class="score-txt">Vacilos</div>
                        </div>
                        <div class="controls">
                            <button class="btn-p" onclick="act(${p.id}, -1)"><i class="fas fa-minus"></i></button>
                            <button class="btn-p btn-add" onclick="act(${p.id}, 1)"><i class="fas fa-plus"></i></button>
                        </div>
                        <div class="prog-container">
                            <div class="prog-bg"><div class="prog-fill" style="width: ${progress}%"></div></div>
                        </div>
                    </div>
                `;
            }).join("");
        }

        window.act = (id, amt) => {
            const p = people.find(x => x.id === id);
            updatePoints(p, amt);
        };

        function showNotify(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.classList.add("show");
            setTimeout(() => t.classList.remove("show"), 2500);
        }

        document.getElementById("loadBtn").onclick = loadData;
        document.getElementById("zeroBtn").onclick = resetAll;
        loadData();
    </script>
</body>
</html>
